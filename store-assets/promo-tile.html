<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 440px;
      height: 280px;
      overflow: hidden;
      background: #16213e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .bg {
      width: 440px;
      height: 280px;
      background: linear-gradient(140deg, #16213e 0%, #0f172a 100%);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      overflow: hidden;
    }

    /* Background glow */
    .bg::before {
      content: '';
      position: absolute;
      top: -60px;
      right: 80px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 65%);
      pointer-events: none;
    }

    .bg::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: 20px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(5,150,105,0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Left — text */
    .left {
      position: relative;
      z-index: 2;
      flex: 1;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: #2563eb;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }

    .headline {
      font-size: 22px;
      font-weight: 800;
      color: #f8fafc;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
      max-width: 210px;
    }

    .headline span { color: #60a5fa; }

    .sub {
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
      max-width: 200px;
    }

    /* Right — widget replica */
    .right {
      position: relative;
      z-index: 2;
      flex-shrink: 0;
    }

    .widget {
      width: 162px;
      background: #1e293b;
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.07);
      overflow: hidden;
    }

    .w-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px 7px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .w-matter {
      font-size: 10px;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .w-body { padding: 10px 12px; }

    .w-time {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 2px;
      color: #f8fafc;
      margin-bottom: 9px;
      font-variant-numeric: tabular-nums;
    }

    .w-controls {
      display: flex;
      gap: 5px;
    }

    .w-btn {
      flex: 1;
      padding: 6px 4px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      text-align: center;
    }

    .w-btn.pause { background: #d97706; color: #fff; }
    .w-btn.reset { background: rgba(255,255,255,0.08); color: #cbd5e1; }
    .w-btn.log { background: #059669; color: #fff; }

    .w-bar {
      margin-top: 7px;
      padding: 4px 7px;
      border-radius: 5px;
      font-size: 9px;
      text-align: center;
      background: rgba(5,150,105,0.15);
      color: #6ee7b7;
    }

    /* Floating badge */
    .badge {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #2563eb;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 20px;
      white-space: nowrap;
      box-shadow: 0 4px 12px rgba(37,99,235,0.4);
    }
  </style>
</head>
<body>
  <div class="bg">
    <div class="left">
      <div class="logo-row">
        <div class="logo-icon">⏱</div>
        <span class="logo-text">Clio Tools</span>
      </div>
      <div class="headline">Billable time,<br><span>tracked.</span></div>
      <div class="sub">Floating timer inside Clio.<br>Log entries without leaving<br>the page you're on.</div>
    </div>
    <div class="right">
      <div class="badge">Free 14-day trial</div>
      <div class="widget">
        <div class="w-header">
          <span class="w-matter">Smith v. Johnson</span>
        </div>
        <div class="w-body">
          <div class="w-time">00:08:41</div>
          <div class="w-controls">
            <div class="w-btn pause">Pause</div>
            <div class="w-btn reset">Reset</div>
            <div class="w-btn log">Log</div>
          </div>
          <div class="w-bar">Trial active — 11 days left</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
