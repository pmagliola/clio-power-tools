<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clio Power Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      padding: 18px 16px 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #111827;
      background: #fff;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }

    .logo-mark {
      width: 24px;
      height: 24px;
      background: #0F172A;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-upgrade {
      background: #059669;
      color: #fff;
    }

    .btn-upgrade:hover:not(:disabled) { background: #047857; }

    .btn-trial {
      background: #F0FDF4;
      color: #059669;
      border: 1.5px solid #059669;
      font-weight: 600;
    }

    .btn-trial:hover:not(:disabled) { background: #DCFCE7; }

    .trial-card {
      padding: 9px 12px;
      background: #ECFDF5;
      border: 1px solid #6EE7B7;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 11px;
      color: #065F46;
    }

    .trial-card.expired {
      background: #FFF7ED;
      border-color: #FED7AA;
      color: #9A3412;
    }

    .trial-label { font-weight: 600; margin-bottom: 2px; }
    .trial-sub { opacity: 0.8; }

    h1 {
      font-size: 15px;
      font-weight: 700;
      color: #111827;
    }

    .subtitle {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 16px;
      padding-left: 32px;
    }

    .status-card {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1d5db;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .status-dot.connected { background: #10b981; }

    .status-label {
      font-size: 12px;
      color: #374151;
      font-weight: 500;
    }

    .status-sub {
      font-size: 11px;
      color: #9ca3af;
      margin-left: auto;
    }

    button {
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 7px;
      transition: background 0.12s, opacity 0.12s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #0F172A;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { background: #1E293B; }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #e5e7eb;
    }

    .btn-secondary:hover:not(:disabled) { background: #e5e7eb; }

    .btn-danger {
      background: #fff;
      color: #dc2626;
      border: 1px solid #fca5a5;
    }

    .btn-danger:hover:not(:disabled) { background: #fef2f2; }

    .divider {
      height: 1px;
      background: #f3f4f6;
      margin: 10px 0;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 2px;
    }

    .version { font-size: 10px; color: #d1d5db; }

    .tier-badge {
      font-size: 10px;
      font-weight: 600;
      color: #6b7280;
      background: #f3f4f6;
      border-radius: 4px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <div class="logo-row">
    <div class="logo-mark">
      <img src="../icons/icon32.png" width="18" height="18" alt="">
    </div>
    <h1>Clio Power Tools</h1>
  </div>
  <p class="subtitle">One-click time tracking for Clio</p>

  <div class="status-card">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-label" id="status-label">Checking...</span>
    <span class="status-sub" id="status-sub"></span>
  </div>

  <button class="btn-primary" id="btn-connect">Connect to Clio</button>
  <button class="btn-danger" id="btn-disconnect" style="display:none">Disconnect</button>

  <div id="trial-section" style="display:none">
    <div class="trial-card" id="trial-card" style="display:none">
      <div class="trial-label" id="trial-label"></div>
      <div class="trial-sub" id="trial-sub"></div>
    </div>
    <button class="btn-trial" id="btn-start-trial" style="display:none">Start free 14-day trial</button>
    <button class="btn-upgrade" id="btn-upgrade" style="display:none">Upgrade to Pro — $9.99/mo</button>
  </div>

  <div class="divider"></div>

  <button class="btn-secondary" id="btn-open-clio">Open Clio</button>

  <div class="footer">
    <span class="version">v0.1.0</span>
    <span class="tier-badge" id="tier-badge">Checking...</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
